{% extends "base.html" %}
{% block content %}
<div class="login-wrap">
    <div class="login-card">
        <h1>Pet & Gato Web</h1>
        <p class="muted">Entre no sistema</p>
        <form method="post" action="/login" class="form-grid">
            <input type="text" name="username" placeholder="Usuário" autocomplete="off" required>
            <input type="password" name="password" placeholder="Senha" autocomplete="off" required>
            <button type="submit">Entrar</button>
        </form>
        <p class="muted" style="margin-top:14px;">Usuários e perfis podem ser gerenciados depois pelo administrador.</p>
    </div>
</div>
{% endblock %}
