<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pet & Gato Web</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <form class="card login-card" action="/login" method="post">
        <h1>Pet & Gato Web</h1>
        <p class="muted">Entre no sistema</p>
        <input type="text" name="username" placeholder="Usuário" required>
        <input type="password" name="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
        <p class="muted small">
            Usuários e perfis podem ser gerenciados depois pelo administrador.
        </p>
    </form>
</body>
</html>
